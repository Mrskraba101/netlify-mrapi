<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MrAPI</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
  body {
    background: linear-gradient(135deg, #ffffff, #000000);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    border: none;
    border-radius: 20px;
    overflow: hidden;
    transition: 0.3s;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
  }

  .card:hover {
    transform: scale(1.05);
    box-shadow: 0 20px 40px rgba(0,0,0,0.6);
  }

  .card img {
    height: 200px;
    object-fit: cover;
  }

  .card-body {
    background: #111;
    text-align: center;
  }

  .btn-custom {
    border-radius: 50px;
    padding: 10px 20px;
    transition: 0.3s;
  }

  .btn-custom:hover {
    background: #000000;
    transform: translateY(-2px);
  }
</style>
</head>

<body>

<a href="https://mrapi.netlify.app/api/quote-generator" style="text-decoration: none;">
  <div class="card text-white" style="width: 18rem;">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQCw_FK3lwubsW6_p_8qiqg1vkzkI2NcZ6N_Q&s" alt="Image">
    
    <div class="card-body">
      <h5 class="card-title">Quote Generator</h5>
      <p class="card-text">Generates a random quote. No limits. No API keys.</p>
      
      <div class="btn btn-primary btn-custom">
        Try it yourself
      </div>
    </div>
  </div>
</a>



<a href="https://discord.gg/support" style="text-decoration: none; display: inline-block; margin-left: 20px;">
  <div class="card text-white" style="width: 18rem;">
    <img src="https://play-lh.googleusercontent.com/0oO5sAneb9lJP6l8c6DH4aj6f85qNpplQVHmPmbbBxAukDnlO7DarDW0b-kEIHa8SQ" alt="Image">
    
    <div class="card-body">
      <h5 class="card-title">Support</h5>
      <p class="card-text">Support server.</p>
      
      <div class="btn btn-primary btn-custom">
        Join
      </div>
    </div>
  </div>
</a>



</body>
</html>
