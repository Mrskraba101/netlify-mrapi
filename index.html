<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MrAPI</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    background: linear-gradient(135deg, #7289da, #000000);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .cards-container {
    display: flex;
    gap: 25px;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
    max-width: 800px;
  }

  .card {
    border: none;
    border-radius: 20px;
    overflow: hidden;
    transition: 0.3s;
    box-shadow: 0 10px 25px #7289da;
    width: 100%;
    max-width: 280px;
    height: 100%;               
    display: flex;
    flex-direction: column;
  }

  .card:hover {
    transform: scale(1.05);
    box-shadow: 0 20px 40px #7289da;
  }

  .card img {
    height: 200px;
    object-fit: cover;
  }

  .card-body {
    background: #7289da;
    text-align: center;
    flex-grow: 1;               
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 20px 15px 25px;
  }

  .btn-custom {
    border-radius: 50px;
    padding: 12px 20px;
    font-weight: 500;
    width: 100%;
    height: 52px;              
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: auto;
  }

  .btn-custom:hover {
    background: #7289da;
    transform: translateY(-2px);
  }
  @media (max-width: 576px) {
    .cards-container {
      flex-direction: column;
      align-items: center;
    }
    
    .card {
      max-width: 320px;
    }
  }
</style>
</head>
<body>

<div class="cards-container">

  <a href="https://mrapi.netlify.app/api/quote-generator" style="text-decoration: none; flex: 1;">
    <div class="card text-white">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQCw_FK3lwubsW6_p_8qiqg1vkzkI2NcZ6N_Q&s" alt="Quote Generator">
      <div class="card-body">
        <h5 class="card-title">Quote Generator</h5>
        <p class="card-text">Generates a random quote. No limits. No API keys.</p>
        <div class="btn btn-primary btn-custom">Try it yourself</div>
      </div>
    </div>
  </a>

  <a href="https://discord.gg/support" style="text-decoration: none; flex: 1;">
    <div class="card text-white">
      <img src="https://play-lh.googleusercontent.com/0oO5sAneb9lJP6l8c6DH4aj6f85qNpplQVHmPmbbBxAukDnlO7DarDW0b-kEIHa8SQ" alt="Support">
      <div class="card-body">
        <h5 class="card-title">Support</h5>
        <p class="card-text">Support server.</p>
        <div class="btn btn-primary btn-custom">Join</div>
      </div>
    </div>
  </a>

</div>

</body>
</html>
