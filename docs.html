<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyAPI - Documentation</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: system-ui, sans-serif; }
    .endpoint { font-family: monospace; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">

  <nav class="bg-white shadow-sm">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2 text-xl font-bold text-gray-800">
        ← Back to Home
      </a>
      <h1 class="text-2xl font-bold">MyAPI Docs</h1>
      <div class="text-sm text-gray-500">v1.0</div>
    </div>
  </nav>

  <div class="max-w-5xl mx-auto px-6 py-10">

    <h1 class="text-4xl font-bold mb-2">Documentation</h1>
    <p class="text-gray-600 mb-10">Simple and clean API, MrAPI.</p>

    <div class="flex gap-4 mb-12 flex-wrap">
      <a href="#intro" class="bg-white px-5 py-2 rounded-xl shadow-sm hover:shadow text-sm font-medium">Introduction</a>
      <a href="#try" class="bg-indigo-600 text-white px-5 py-2 rounded-xl shadow-sm hover:shadow text-sm font-medium">Try It Now</a>
    </div>

    <section id="intro" class="mb-16">
      <h2 class="text-2xl font-semibold mb-4">Introduction</h2>
      <p class="text-gray-700 leading-relaxed">
        Welcome to MrAPI documentation.<br>
        Amazing API for Developers
      </p>
    </section>


    <section id="try" class="mb-16">
      <h2 class="text-2xl font-semibold mb-6">Try It Now - Interactive Demo</h2>
      
      <div class="bg-white border border-gray-200 rounded-2xl p-8 shadow-sm">

        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700 mb-2">Endpoint</label>
          <div class="flex items-center gap-3 bg-gray-100 p-3 rounded-xl">
            <span class="bg-green-500 text-white px-4 py-1 rounded-lg text-sm font-medium">GET</span>
            <span class="font-mono text-lg">/api/quote-generator</span>
          </div>
        </div>

        <button onclick="callAPI()" 
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-4 rounded-2xl transition flex items-center justify-center gap-2">
          <i class="fas fa-paper-plane"></i>
          Send Request
        </button>

        <div id="response" class="mt-8 hidden">
          <label class="block text-sm font-medium text-gray-700 mb-2">Response</label>
          <pre id="responseBody" 
               class="bg-gray-900 text-green-400 p-6 rounded-2xl font-mono text-sm overflow-auto max-h-64"></pre>
        </div>

      </div>
    </section>

  </div>

  <footer class="bg-white py-8 text-center text-gray-500 text-sm">
    MrAPI Documentation
  </footer>

  <script>
    async function callAPI() {
      const input = document.getElementById('nameInput');
      const name = input ? input.value.trim() : "";
      const responseDiv = document.getElementById('response');
      const responseBody = document.getElementById('responseBody');

      responseDiv.classList.remove('hidden');
      responseBody.textContent = "Loading...";

      setTimeout(() => {
        const greeting = name 
          ? `"quote":"Keep pushing forward, no matter what"` 
          : "quote: Keep pushing forward, no matter what";

        const jsonResponse = {
          message: greeting,
        };

        responseBody.textContent = JSON.stringify(jsonResponse, null, 2);
      }, 600);
    }

    const input = document.getElementById('nameInput');
    if (input) {
      input.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          callAPI();
        }
      });
    }
  </script>

</body>
</html>
